            $ref: '#/definitions/internal_handler.ErrorResponse'
        "409":
          description: E-mail já cadastrado
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Registrar novo usuário
      tags:
      - Auth
  /auth/reset-password:
    post:
