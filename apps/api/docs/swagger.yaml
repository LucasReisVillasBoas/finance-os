      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revoga os tokens do usuário e encerra a sessão
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Troca um refresh token expirado por um novo par de tokens
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.AuthDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: Token inválido ou revogado
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Renovar tokens
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Cria uma conta e retorna tokens JWT + dados do usuário
      parameters:
      - description: Dados de registro
        in: body
        name: body
        required: true
        schema:
