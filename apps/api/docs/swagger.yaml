host: localhost:8000
info:
  contact:
    name: FinanceOS Support
    url: https://github.com/financeos
  description: API completa para gestão financeira pessoal — contas, transações, orçamentos,
    investimentos, metas e IA.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: FinanceOS API
  version: 1.0.0
paths:
  /accounts:
    get:
      description: Retorna todas as contas ativas do usuário autenticado
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.AccountListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Listar contas
      tags:
      - Accounts
    post:
      consumes:
      - application/json
      description: Cria uma nova conta bancária, carteira ou cartão
      parameters:
      - description: Dados da conta
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_financeos_api_internal_usecase.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.AccountResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Criar conta
      tags:
      - Accounts
  /accounts/{id}:
    delete:
      parameters:
      - description: UUID da conta
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.MessageResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Desativar conta
      tags:
      - Accounts
    get:
      parameters:
      - description: UUID da conta
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.AccountResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Buscar conta por ID
      tags:
      - Accounts
    put:
      consumes:
      - application/json
      parameters:
      - description: UUID da conta
        in: path
        name: id
        required: true
        type: string
      - description: Campos a atualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_financeos_api_internal_usecase.UpdateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.AccountResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Atualizar conta
      tags:
      - Accounts
  /accounts/summary:
