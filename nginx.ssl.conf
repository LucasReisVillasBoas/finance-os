# nginx.ssl.conf — Production template with HTTPS (Let's Encrypt / Certbot)
#
# Prerequisites:
#   1. Install Certbot on the server
#   2. Run: certbot certonly --standalone -d SEU_DOMINIO.COM.BR
#   3. Replace SEU_DOMINIO.COM.BR below with your actual domain
#   4. Replace this file with nginx.conf (or volume-mount it in docker-compose)
#
# Auto-renewal: add to crontab
#   0 3 * * * certbot renew --quiet && nginx -s reload

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name SEU_DOMINIO.COM.BR;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name SEU_DOMINIO.COM.BR;

    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO.COM.BR/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.COM.BR/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
    }

    location /webhooks/ {
        proxy_pass http://api:8000/webhooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
