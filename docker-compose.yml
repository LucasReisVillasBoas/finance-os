version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: financeos_postgres
    environment:
      POSTGRES_USER: financeos
      POSTGRES_PASSWORD: financeos
      POSTGRES_DB: financeos
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeos -d financeos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: financeos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: financeos_adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: financeos_api
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - go_cache:/go/pkg/mod
    environment:
      DATABASE_URL: postgresql://financeos:financeos@postgres:5432/financeos
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-720h}
      APP_ENV: development
      APP_PORT: 8000
      LOG_LEVEL: debug
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://localhost:8081}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: air -c .air.toml

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: financeos_evolution
    ports:
      - "8081:8080"
    environment:
      - SERVER_URL=http://localhost:8081
      - AUTHENTICATION_API_KEY=financeos-evolution-key
      - DATABASE_ENABLED=false
      - REDIS_ENABLED=false
    restart: unless-stopped

  web:
    image: ghcr.io/cirruslabs/flutter:stable
    container_name: financeos_web
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - flutter_cache:/root/.pub-cache
    environment:
      API_BASE_URL: http://localhost:8000
    command: flutter run -d web-server --web-port 3000 --web-hostname 0.0.0.0
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  go_cache:
  flutter_cache:
